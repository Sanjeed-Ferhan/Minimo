<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALEL Capacity Study</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #0b0d12;
  --card:     #13151c;
  --card2:    #1a1d27;
  --border:   #252836;
  --border2:  #2f3347;
  --accent:   #3ecf8e;
  --accent2:  #f5a623;
  --accent3:  #5c7cfa;
  --accent4:  #f06595;
  --text:     #e2e5f0;
  --muted:    #6b7094;
  --muted2:   #4a4f6a;
  --mono:     'IBM Plex Mono', monospace;
  --sans:     'DM Sans', sans-serif;
  --radius:   10px;
  --shadow:   0 4px 24px rgba(0,0,0,0.4);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  min-height: 100vh;
  display: flex;
}

/* ── Sidebar ── */
.sidebar {
  width: 280px;
  min-width: 280px;
  background: var(--card);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  height: 100vh;
  position: sticky;
  top: 0;
  overflow: hidden;
}

.sidebar-head {
  padding: 20px 16px 14px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.sidebar-logo {
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.12em;
  color: var(--accent);
  text-transform: uppercase;
  font-family: var(--mono);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 7px;
}

.sidebar-logo::before {
  content: '';
  width: 8px; height: 8px;
  background: var(--accent);
  border-radius: 50%;
  animation: blink 2.5s ease-in-out infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

.search-box {
  position: relative;
}
.search-box input {
  width: 100%;
  background: var(--card2);
  border: 1px solid var(--border2);
  color: var(--text);
  font-family: var(--mono);
  font-size: 12px;
  padding: 8px 10px 8px 32px;
  border-radius: 7px;
  outline: none;
  transition: border-color .2s;
}
.search-box input:focus { border-color: var(--accent); }
.search-box input::placeholder { color: var(--muted2); }
.search-box svg { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; }

.sidebar-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px 0;
}
.sidebar-list::-webkit-scrollbar { width: 4px; }
.sidebar-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

.sidebar-item {
  padding: 9px 16px;
  cursor: pointer;
  transition: background .15s, color .15s;
  border-left: 2px solid transparent;
  font-size: 12.5px;
  font-weight: 500;
  color: var(--muted);
  display: flex;
  align-items: center;
  gap: 10px;
  line-height: 1.35;
}
.sidebar-item:hover { background: rgba(62,207,142,0.06); color: var(--text); }
.sidebar-item.active {
  background: rgba(62,207,142,0.1);
  border-left-color: var(--accent);
  color: var(--accent);
  font-weight: 600;
}

.sidebar-item .item-num {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--muted2);
  min-width: 22px;
  flex-shrink: 0;
}
.sidebar-item.active .item-num { color: var(--accent); opacity: .7; }

.sidebar-item .item-daily {
  margin-left: auto;
  font-family: var(--mono);
  font-size: 10px;
  color: var(--muted2);
  flex-shrink: 0;
}
.sidebar-item.active .item-daily { color: var(--accent); opacity: .8; }

/* ── Main ── */
.main {
  flex: 1;
  overflow-y: auto;
  padding: 28px 32px 60px;
  min-width: 0;
}
.main::-webkit-scrollbar { width: 5px; }
.main::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

/* ── Page header ── */
.page-title {
  font-size: 22px;
  font-weight: 700;
  line-height: 1.2;
  letter-spacing: -0.02em;
  margin-bottom: 4px;
  color: var(--text);
}
.page-sub {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 0.04em;
  margin-bottom: 24px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.page-sub span { display: flex; align-items: center; gap: 5px; }

/* ── KPI cards ── */
.kpi-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 12px;
  margin-bottom: 28px;
}

.kpi-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 18px;
  position: relative;
  overflow: hidden;
  transition: border-color .2s, transform .15s;
}
.kpi-card:hover { border-color: var(--border2); transform: translateY(-1px); }
.kpi-card::after {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: var(--kpi-color, var(--accent));
}

.kpi-label {
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 5px;
}
.kpi-label svg { color: var(--kpi-color, var(--accent)); }

.kpi-value {
  font-size: 26px;
  font-weight: 700;
  line-height: 1;
  letter-spacing: -0.02em;
  color: var(--kpi-color, var(--accent));
}
.kpi-value small {
  font-size: 13px;
  font-weight: 500;
  color: var(--muted);
  margin-left: 2px;
}

/* ── Bar chart ── */
.section-label {
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.section-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

.chart-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px 22px;
  margin-bottom: 28px;
}

.bar-chart { display: flex; flex-direction: column; gap: 8px; }
.bar-row { display: flex; align-items: center; gap: 10px; }
.bar-label {
  font-size: 11.5px;
  color: var(--muted);
  width: 200px;
  min-width: 200px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  text-align: right;
}
.bar-track {
  flex: 1;
  height: 8px;
  background: var(--card2);
  border-radius: 4px;
  overflow: hidden;
}
.bar-fill {
  height: 100%;
  border-radius: 4px;
  background: var(--accent);
  transition: width .5s ease;
  min-width: 2px;
}
.bar-val {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text);
  min-width: 50px;
  font-weight: 600;
}

/* ── Steps table ── */
.steps-table-wrap {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  margin-bottom: 28px;
}

.steps-table-head {
  padding: 14px 20px;
  background: var(--card2);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  flex-wrap: wrap;
}
.steps-table-head h3 {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  display: flex;
  align-items: center;
  gap: 8px;
}
.steps-table-head h3 svg { color: var(--accent3); }

.badge-pill {
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 600;
  padding: 3px 9px;
  border-radius: 20px;
  background: rgba(92,124,250,0.15);
  border: 1px solid rgba(92,124,250,0.3);
  color: var(--accent3);
}

.steps-scroll { overflow-x: auto; }
.steps-scroll::-webkit-scrollbar { height: 4px; }
.steps-scroll::-webkit-scrollbar-thumb { background: var(--border2); }

table {
  border-collapse: collapse;
  width: 100%;
  font-size: 12.5px;
}
thead th {
  background: var(--card2);
  padding: 10px 14px;
  text-align: left;
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--muted);
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
  position: sticky;
  top: 0;
}
thead th:first-child { width: 40px; text-align: center; color: var(--muted2); }
thead th.col-accent { color: var(--accent2); }

tbody tr { border-bottom: 1px solid rgba(37,40,54,0.7); transition: background .12s; }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: rgba(255,255,255,0.025); }

tbody td { padding: 10px 14px; vertical-align: middle; }
tbody td:first-child {
  text-align: center;
  font-family: var(--mono);
  font-size: 10px;
  color: var(--muted2);
  width: 40px;
}

.step-name { font-weight: 500; color: var(--text); line-height: 1.4; }
.worker-name { color: var(--muted); font-size: 11.5px; }

.mp-badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  background: rgba(92,124,250,0.15);
  border: 1px solid rgba(92,124,250,0.25);
  color: var(--accent3);
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 600;
  width: 26px; height: 22px;
  border-radius: 5px;
}

.rating-pill {
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 600;
  padding: 2px 7px;
  border-radius: 4px;
}
.rating-high { background: rgba(62,207,142,0.12); color: var(--accent); border: 1px solid rgba(62,207,142,0.25); }
.rating-mid  { background: rgba(245,166,35,0.12);  color: var(--accent2); border: 1px solid rgba(245,166,35,0.25); }
.rating-low  { background: rgba(240,101,149,0.12); color: var(--accent4); border: 1px solid rgba(240,101,149,0.25); }

.num-cell {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--text);
  text-align: right;
}
.num-cell.dim { color: var(--muted); }

/* Hourly micro-bar */
.hourly-wrap { display: flex; align-items: center; gap: 7px; }
.hourly-bar { flex: 1; min-width: 40px; height: 5px; background: var(--card2); border-radius: 3px; overflow: hidden; }
.hourly-fill { height: 100%; border-radius: 3px; background: var(--accent2); }
.hourly-num { font-family: var(--mono); font-size: 11px; font-weight: 600; color: var(--accent2); min-width: 32px; text-align: right; }

/* ── Empty state ── */
.empty { text-align: center; padding: 60px 20px; color: var(--muted); }
.empty svg { margin-bottom: 12px; opacity: .3; }
.empty p { font-size: 14px; }

/* ── Responsive ── */
@media (max-width: 900px) {
  .sidebar { width: 220px; min-width: 220px; }
  .bar-label { width: 120px; min-width: 120px; }
}
@media (max-width: 640px) {
  .sidebar { display: none; }
  .main { padding: 16px 16px 40px; }
}

/* ── Animations ── */
.fade-in { animation: fadeIn .25s ease both; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

/* ── No-data notice ── */
.no-data-card {
  background: var(--card);
  border: 1px dashed var(--border2);
  border-radius: var(--radius);
  padding: 40px;
  text-align: center;
  color: var(--muted);
  font-size: 13px;
  margin-top: 20px;
}
</style>
</head>

// ── Sidebar ──────────────────────────────────────────────────────────────────
const sidebarList   = document.getElementById('sidebarList');
const sidebarSearch = document.getElementById('sidebarSearch');
const mainContent   = document.getElementById('mainContent');

function buildSidebar(filter = '') {
  sidebarList.innerHTML = '';
  const q = filter.toLowerCase();
  SHEETS.forEach((sheet, idx) => {
    if (q && !sheet.name.toLowerCase().includes(q)) return;
    const daily = sheet.summary.daily_capacity;
    const el = document.createElement('div');
    el.className = 'sidebar-item';
    el.dataset.idx = idx;
    el.innerHTML = `
      <span class="item-num">${String(idx+1).padStart(2,'0')}</span>
      <span style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${sheet.name}</span>
      ${daily ? `<span class="item-daily">${daily}</span>` : ''}
    `;
    el.addEventListener('click', () => selectSheet(idx));
    sidebarList.appendChild(el);
  });
}

sidebarSearch.addEventListener('input', () => buildSidebar(sidebarSearch.value));

// ── Rating class ─────────────────────────────────────────────────────────────
function ratingClass(r) {
  if (!r) return '';
  const v = parseFloat(r);
  if (v >= 82) return 'rating-high';
  if (v >= 75) return 'rating-mid';
  return 'rating-low';
}

// ── Select sheet ─────────────────────────────────────────────────────────────
function selectSheet(idx) {
  // Update sidebar
  document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
  const active = document.querySelector(`.sidebar-item[data-idx="${idx}"]`);
  if (active) {
    active.classList.add('active');
    active.scrollIntoView({ block: 'nearest' });
  }

  const sheet = SHEETS[idx];
  const s = sheet.summary;
  const steps = sheet.steps;
  const hasData = steps.length > 0;

  // Max hourly for bar scaling
  const maxHourly = Math.max(...steps.map(st => parseInt(st.hourly) || 0), 1);

  // ── KPI cards ───
  const kpis = [
    { label:'Hourly Capacity', value: s.hourly_capacity || '—', unit:'', color:'var(--accent)',  icon:`<path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>` },
    { label:'Daily Capacity',  value: s.daily_capacity  || '—', unit:'', color:'var(--accent3)', icon:`<rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>` },
    { label:'Manpower',        value: s.manpower        || '—', unit:'', color:'var(--accent2)', icon:`<path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/>` },
    { label:'SMV',             value: s.smv             || '—', unit:'min', color:'var(--accent4)', icon:`<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>` },
    { label:'Rating',          value: s.rating          || '—', unit:'', color:'#a78bfa',         icon:`<polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>` },
    { label:'No. of Steps',    value: s.no_of_steps || steps.length || '—', unit:'', color:'var(--muted)', icon:`<line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>` },
  ];

  const kpiHTML = kpis.map(k => `
    <div class="kpi-card" style="--kpi-color:${k.color}">
      <div class="kpi-label">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${k.icon}</svg>
        ${k.label}
      </div>
      <div class="kpi-value">${k.value}${k.unit ? `<small>${k.unit}</small>` : ''}</div>
    </div>
  `).join('');

  // ── Hourly bar chart ───
  const barsHTML = steps.length ? steps.map(st => {
    const h = parseInt(st.hourly) || 0;
    const pct = h ? Math.round(h / maxHourly * 100) : 0;
    return `
      <div class="bar-row">
        <div class="bar-label">${esc(st.step)}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
        <div class="bar-val">${h ? h.toLocaleString() : '—'}</div>
      </div>
    `;
  }).join('') : '<div style="color:var(--muted);font-size:13px;padding:12px 0">No step data</div>';

  // ── Steps table ───
  const tableRows = steps.map(st => {
    const h = parseInt(st.hourly) || 0;
    const maxH = maxHourly;
    const pct = h ? Math.round(h / maxH * 100) : 0;
    return `
      <tr>
        <td>${st.sl}</td>
        <td>
          <div class="step-name">${esc(st.step)}</div>
          ${st.worker ? `<div class="worker-name">${esc(st.worker)}</div>` : ''}
        </td>
        <td><span class="mp-badge">${st.mp || '—'}</span></td>
        <td>${st.rating ? `<span class="rating-pill ${ratingClass(st.rating)}">${st.rating}</span>` : '<span style="color:var(--muted2)">—</span>'}</td>
        <td class="num-cell dim">${st.avg_sec || '—'}</td>
        <td class="num-cell">${st.smv || '—'}</td>
        <td>
          <div class="hourly-wrap">
            <div class="hourly-bar"><div class="hourly-fill" style="width:${pct}%"></div></div>
            <div class="hourly-num">${h ? h.toLocaleString() : '—'}</div>
          </div>
        </td>
      </tr>
    `;
  }).join('');

  const noDataCard = !hasData ? `
    <div class="no-data-card">
      📋 No step-level data recorded for this product yet
    </div>
  ` : '';

  mainContent.innerHTML = `
    <div class="fade-in">
      <h1 class="page-title">${esc(sheet.name)}</h1>
      <div class="page-sub">
        ${sheet.product_group ? `<span>📦 ${esc(sheet.product_group)}</span>` : ''}
        ${sheet.item_name     ? `<span>🏷 ${esc(sheet.item_name)}</span>`     : ''}
        <span style="margin-left:auto;color:var(--muted2);font-size:10px">${idx+1} / ${SHEETS.length}</span>
      </div>

      <div class="kpi-grid">${kpiHTML}</div>

      ${hasData ? `
      <div class="section-label">Hourly Output by Step</div>
      <div class="chart-card">
        <div class="bar-chart">${barsHTML}</div>
      </div>

      <div class="section-label">Step-by-Step Breakdown</div>
      <div class="steps-table-wrap">
        <div class="steps-table-head">
          <h3>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
            Process Steps
          </h3>
          <span class="badge-pill">${steps.length} steps</span>
        </div>
        <div class="steps-scroll">
          <table>
            <thead>
              <tr>
                <th>#</th>
                <th>Step / Worker</th>
                <th>MP</th>
                <th>Rating</th>
                <th>Avg (sec)</th>
                <th class="col-accent">SMV</th>
                <th class="col-accent">Hourly Cap.</th>
              </tr>
            </thead>
            <tbody>${tableRows}</tbody>
          </table>
        </div>
      </div>
      ` : noDataCard}
    </div>
  `;
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Init ─────────────────────────────────────────────────────────────────────
buildSidebar();
// Auto-select first sheet
if (SHEETS.length > 0) selectSheet(0);
</script>
</body>
</html>
